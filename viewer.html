<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <title>PDF Sentence Navigator</title>
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>
  <header id="toolbar">
    <div id="loadControls">
      <label class="fileBtn">
        PDF ფაილის არჩევა
        <input type="file" id="fileInput" accept="application/pdf,.pdf" />
      </label>
      <span class="sep">ან</span>
      <input type="text" id="urlInput" placeholder="ჩასვით PDF-ის URL და დააჭირეთ Enter" />
      <button id="loadUrlBtn">ჩატვირთვა</button>
    </div>
    <div id="docTitle"></div>
    <div id="hint">Tab — შემდეგი წინადადება &nbsp;|&nbsp; Shift+Tab — წინა წინადადება</div>
  </header>

  <main id="pageContainer" tabindex="0"></main>

  <div id="statusBadge" style="display:none;"></div>
  <div id="emptyState">
    <p>აირჩიეთ PDF ფაილი ან ჩასვით ბმული ზემოთ, რომ დაიწყოთ.</p>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
